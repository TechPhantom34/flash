name: SWF Derleyici
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 8 Kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Flex SDK Hazırla ve Derle
        run: |
          # SDK İndir ve Ayıkla
          wget -q https://archive.apache.org/dist/flex/4.16.1/binaries/apache-flex-sdk-4.16.1-binaries.tar.gz
          tar -xzf apache-flex-sdk-4.16.1-binaries.tar.gz
          
          # Flex'e Java yolunu göster (En kritik adım)
          export FLEX_HOME=$GITHUB_WORKSPACE/apache-flex-sdk-4.16.1-binaries
          export JAVA_HOME=$JAVA_HOME_8_X64
          
          # Derleme komutu (Hata detaylarını görmek için verbose ekledik)
          ./apache-flex-sdk-4.16.1-binaries/bin/mxmlc \
            -static-link-runtime-shared-libraries=true \
            -target-player=32.0 \
            oyun.as -o sonuc.swf || { echo "Derleme Hatası!"; exit 8; }

      - name: Dosyayı Yükle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BenimOyunum
          path: sonuc.swf
